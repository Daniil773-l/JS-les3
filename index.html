<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Certification Exam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .exam-card { transition: transform 0.2s; }
        .exam-card:hover { transform: scale(1.01); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4">

    <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-xl p-8 border border-gray-200">
        <h1 class="text-3xl font-black text-gray-800 text-center mb-2">🎓 Сертификационный тест по Docker</h1>
        <p class="text-gray-500 text-center mb-8">Пожалуйста, заполните данные перед началом</p>

        <!-- Форма данных -->
        <div id="auth-section" class="space-y-4">
            <input type="text" id="fio" placeholder="Ваше ФИО" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="text" id="group" placeholder="Ваша группа" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="startExam()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700">Начать тестирование</button>
        </div>

        <!-- Тест -->
        <div id="exam-section" class="hidden space-y-8">
            <div id="quiz-container"></div>
            <button onclick="finishExam()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700">Завершить и получить оценку</button>
        </div>

        <!-- Результат -->
        <div id="result-section" class="hidden text-center space-y-4">
            <div class="bg-blue-50 p-6 rounded-2xl border-2 border-blue-200">
                <h2 class="text-2xl font-bold text-blue-800">Результаты экзамена</h2>
                <p id="student-info" class="text-gray-600"></p>
                <p id="final-score" class="text-5xl font-black text-blue-600 my-4"></p>
                <button onclick="location.reload()" class="bg-gray-800 text-white px-6 py-2 rounded-lg">Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Какой сетевой драйвер использует VXLAN?", options: ["Bridge", "Host", "Overlay", "Macvlan"], a: 2 },
            { q: "Где хранятся тома по умолчанию?", options: ["/tmp", "/var/lib/docker/volumes/", "/etc", "/var/log"], a: 1 },
            { q: "Что делает команда docker rm?", options: ["Удаляет контейнер", "Удаляет образ", "Удаляет сеть", "Чистит кэш"], a: 0 },
            { q: "Что такое Dockerfile?", options: ["Инструкция сборки", "Конфиг сети", "Список томов", "Лог"], a: 0 },
            { q: "Команда для сборки образа?", options: ["docker build", "docker run", "docker pull", "docker push"], a: 0 },
            { q: "Что делает флаг -d в docker run?", options: ["Фоновый режим", "Отладка", "Скачивание", "Удаление"], a: 0 },
            { q: "Как остановить контейнер?", options: ["docker stop", "docker kill", "docker pause", "docker remove"], a: 0 },
            { q: "Официальный реестр образов?", options: ["Docker Hub", "GitHub", "GitLab", "Docker Store"], a: 0 },
            { q: "Зачем нужен .dockerignore?", options: ["Исключить файлы из сборки", "Скрыть пароли", "Ускорить сеть", "Сжать образ"], a: 0 },
            { q: "Что делает docker pull?", options: ["Скачивает образ", "Отправляет образ", "Запускает образ", "Удаляет образ"], a: 0 },
            { q: "Что делает docker push?", options: ["Отправляет в реестр", "Скачивает", "Собирает", "Запускает"], a: 0 },
            { q: "Разница CMD и ENTRYPOINT?", options: ["CMD переопределим", "ENTRYPOINT важнее", "Одинаковые", "Сетевые"], a: 0 },
            { q: "Что такое Docker Swarm?", options: ["Оркестрация", "Сеть", "База данных", "Язык"], a: 0 },
            { q: "Команда для логов?", options: ["docker logs", "docker show", "docker view", "docker print"], a: 0 },
            { q: "Что делает --rm?", options: ["Удаляет после остановки", "Рестарт", "Сеть", "Фон"], a: 0 },
            { q: "Что такое Multi-stage build?", options: ["Многоэтапная сборка", "Многопоточность", "Тип тома", "Версия"], a: 0 },
            { q: "Команда входа в контейнер?", options: ["docker exec -it", "docker login", "docker attach", "docker run"], a: 0 },
            { q: "Что делает docker inspect?", options: ["Детальная информация", "Чистка", "Обновление", "Проверка"], a: 0 },
            { q: "Docker внутри Docker?", options: ["Да", "Нет", "Иногда", "Запрещено"], a: 0 },
            { q: "Порт Nginx?", options: ["80", "443", "8080", "22"], a: 0 },
            { q: "Что такое veth?", options: ["Виртуальный интерфейс", "Тип тома", "Команда", "Ошибка"], a: 0 },
            { q: "Что делает команда docker network ls?", options: ["Список сетей", "Удаление", "Создание", "Информация"], a: 0 },
            { q: "Что такое bind mount?", options: ["Связь с папкой хоста", "Том Docker", "Сеть", "Конфиг"], a: 0 },
            { q: "Драйвер Macvlan для чего?", options: ["Реальный MAC-адрес", "Wi-Fi", "Диск", "Логи"], a: 1 },
            { q: "Что произойдет с данными в Anonymous Volume?", options: ["Удалятся", "Сохранятся", "Переедут", "Зашифруются"], a: 0 },
            { q: "Какой файл для описания композиции?", options: ["docker-compose.yml", "Dockerfile", "config.json", "data.txt"], a: 0 },
            { q: "Модель Docker сетей?", options: ["CNM", "OSI", "TCP", "HTTP"], a: 0 },
            { q: "Команда для удаления всех контейнеров?", options: ["docker rm $(docker ps -a -q)", "docker stop", "docker kill", "docker clear"], a: 0 },
            { q: "Можно ли переименовать контейнер?", options: ["Да", "Нет", "Только при создании", "Только в Swarm"], a: 0 },
            { q: "Для чего нужны Layer?", options: ["Слои образа", "Сетки", "Сети", "Логи"], a: 0 }
        ];

        function startExam() {
            const fio = document.getElementById('fio').value;
            const group = document.getElementById('group').value;
            if(!fio || !group) return alert("Заполните поля!");
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('exam-section').classList.remove('hidden');
            renderQuiz();
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            questions.forEach((q, i) => {
                let html = `<div class="p-6 bg-gray-50 rounded-2xl border exam-card"><p class="font-bold mb-4">${i+1}. ${q.q}</p>`;
                q.options.forEach((o, j) => {
                    html += `<label class="block mb-2 cursor-pointer"><input type="radio" name="q${i}" value="${j}" class="mr-2">${o}</label>`;
                });
                container.innerHTML += html + `</div>`;
            });
        }

        function finishExam() {
            let score = 0;
            questions.forEach((q, i) => {
                const selected = document.querySelector(`input[name="q${i}"]:checked`);
                if(selected && parseInt(selected.value) === q.a) score++;
            });
            document.getElementById('exam-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('student-info').innerText = `${document.getElementById('fio').value}, группа ${document.getElementById('group').value}`;
            document.getElementById('final-score').innerText = `${score} / 30`;
        }
    </script>
</body>
</html>
